name: Xamina Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build & Push Docker images
        run: |
          docker build -t xamina-api ./xamina-backend
          docker build -t xamina-fe ./xamina-frontend
          docker push ghcr.io/...

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/xamina
            docker-compose pull
            docker-compose up -d --no-deps api frontend
            docker-compose exec api sqlx migrate run
